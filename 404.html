<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found | David Barnes</title>
    <meta
      name="description"
      content="The page you were looking for could not be found."
    />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="not-found">
      <section class="container reading-width not-found-card">
        <p class="eyebrow">404</p>
        <h1 class="not-found-title">That page has wandered off.</h1>
        <p class="not-found-copy">
          The link may be out of date, or the page may have moved.
        </p>
        <div class="hero-actions">
          <a class="button button-primary" href="/">Return home</a>
          <a class="button button-secondary" href="mailto:me@davidbarn.es">Email David</a>
        </div>
      </section>
    </main>
  </body>
</html>
